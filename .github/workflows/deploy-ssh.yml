name: Deploy via SSH

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options:
          - production
          - staging

# TODO: Configure SSH deployment
# Required secrets:
#   SSH_HOST       – remote server hostname or IP
#   SSH_USER       – SSH username
#   SSH_PRIVATE_KEY – SSH private key (PEM format)
#   SSH_PORT       – SSH port (default: 22)
#   DEPLOY_PATH    – remote path to deploy to

jobs:
  deploy-ssh:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

